<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RJ's Birthday Bash 🎉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @keyframes bg-neon-shift {
      0% { background: linear-gradient(45deg, #0d0221 0%, #1a0033 25%, #2d0052 50%, #1a0033 75%, #0d0221 100%); }
      25% { background: linear-gradient(45deg, #1a0033 0%, #2d0052 25%, #1a0033 50%, #0d0221 75%, #1a0033 100%); }
      50% { background: linear-gradient(45deg, #2d0052 0%, #0d0221 25%, #1a0033 50%, #2d0052 75%, #0d0221 100%); }
      75% { background: linear-gradient(45deg, #1a0033 0%, #0d0221 25%, #2d0052 50%, #1a0033 75%, #2d0052 100%); }
      100% { background: linear-gradient(45deg, #0d0221 0%, #1a0033 25%, #2d0052 50%, #1a0033 75%, #0d0221 100%); }
    }

    @keyframes subtle-glow {
      0%, 100% { text-shadow: 0 0 10px #ff006e; }
      50% { text-shadow: 0 0 20px #ff006e; }
    }

    @keyframes gentle-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    @keyframes slight-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulse-insane {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    body {
      background: linear-gradient(45deg, #0d0221 0%, #1a0033 25%, #2d0052 50%, #1a0033 75%, #0d0221 100%);
      background-size: 400% 400%;
      animation: bg-neon-shift 12s ease-in-out infinite;
      font-family: 'Comic Sans MS', 'Brush Script MT', cursive;
      color: #00ff88;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      width: 100vw;
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .star {
      position: absolute;
      background: radial-gradient(circle, #ffff00, transparent 70%);
      border-radius: 50%;
      animation: pulse-insane 2s infinite;
    }

    .container {
      max-width: 900px;
      width: 100%;
      background: linear-gradient(135deg, #ff006e, #ffbe0b, #00f5ff, #ff006e);
      padding: 3px;
      border-radius: 20px;
      box-sizing: border-box;
    }

    .inner {
      background: #0d0221;
      padding: 50px;
      border-radius: 17px;
      border: 5px dashed #00ff88;
      box-shadow: 0 0 50px rgba(255, 0, 110, 0.8), 0 0 30px rgba(0, 245, 255, 0.6);
    }

    h1 {
      font-size: 4em;
      text-align: center;
      animation: subtle-glow 3s ease-in-out infinite, slight-float 4s ease-in-out infinite;
      text-shadow: 3px 3px 0 #ff006e, 6px 6px 0 #00f5ff, 9px 9px 0 #ffbe0b;
      letter-spacing: 3px;
      margin-bottom: 20px;
      word-wrap: break-word;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2.5em;
        text-shadow: 2px 2px 0 #ff006e, 4px 4px 0 #00f5ff, 6px 6px 0 #ffbe0b;
      }

      .subtitle {
        font-size: 1em;
      }

      .inner {
        padding: 25px 15px;
        border: 3px dashed #00ff88;
      }

      .form-inner h2 {
        font-size: 1.3em;
      }

      textarea {
        font-size: 1em;
        min-height: 100px;
      }

      input[type="text"] {
        font-size: 0.95em;
      }

      button {
        font-size: 1.1em;
        padding: 12px;
      }

      .message-card {
        margin-bottom: 10px;
      }

      .message-inner {
        padding: 15px;
      }

      .message-author {
        font-size: 1em;
      }

      .message-text {
        font-size: 1em;
      }

      .messages-title {
        font-size: 1.4em;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 8px;
        width: 100vw;
        margin: 0;
      }

      h1 {
        font-size: 1.5em;
        text-shadow: 1px 1px 0 #ff006e, 2px 2px 0 #00f5ff;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
        white-space: normal;
        overflow-wrap: break-word;
      }

      .subtitle {
        font-size: 0.9em;
        margin-bottom: 15px;
      }

      .container {
        padding: 2px;
        border-radius: 12px;
        width: 100%;
        box-sizing: border-box;
      }

      .inner {
        padding: 12px 8px;
        border: 2px dashed #00ff88;
        box-sizing: border-box;
        overflow-x: hidden;
      }

      .form-section {
        border-radius: 10px;
        margin-bottom: 20px;
      }

      .form-inner {
        padding: 15px;
      }

      .form-inner h2 {
        font-size: 1.1em;
        margin-bottom: 15px;
      }

      textarea {
        padding: 10px;
        font-size: 0.9em;
        min-height: 80px;
        margin-bottom: 8px;
      }

      input[type="text"] {
        padding: 10px;
        font-size: 0.9em;
        margin-bottom: 10px;
      }

      button {
        font-size: 1em;
        padding: 12px;
        letter-spacing: 1px;
      }

      .messages-section {
        margin-top: 20px;
      }

      .messages-title {
        font-size: 1.2em;
        margin-bottom: 15px;
      }

      .message-card {
        margin-bottom: 10px;
      }

      .message-inner {
        padding: 12px;
        border-left: 3px solid #00f5ff;
      }

      .message-author {
        font-size: 0.95em;
        margin-bottom: 8px;
      }

      .message-text {
        font-size: 0.95em;
      }

      .loading {
        font-size: 1em;
      }

      .success-msg {
        font-size: 1em;
      }
    }

    .subtitle {
      text-align: center;
      font-size: 1.5em;
      color: #ffbe0b;
      margin-bottom: 30px;
      text-shadow: 0 0 20px #ffbe0b;
      animation: gentle-pulse 3s ease-in-out infinite;
      word-wrap: break-word;
    }

    .form-section {
      background: linear-gradient(45deg, #ff006e, #00f5ff);
      padding: 3px;
      border-radius: 15px;
      margin-bottom: 30px;
    }

    .form-inner {
      background: #0d0221;
      padding: 30px;
      border-radius: 12px;
    }

    .form-inner h2 {
      color: #00ff88;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ff88;
      font-size: 1.8em;
    }

    textarea {
      width: 100%;
      padding: 15px;
      margin-bottom: 10px;
      background: #1a0033;
      border: 3px solid #ffbe0b;
      color: #00ff88;
      font-family: 'Comic Sans MS', cursive;
      font-size: 1.1em;
      border-radius: 10px;
      resize: vertical;
      min-height: 120px;
      box-shadow: 0 0 20px rgba(255, 190, 11, 0.5);
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background: #1a0033;
      border: 3px solid #00f5ff;
      color: #00ff88;
      font-family: 'Comic Sans MS', cursive;
      font-size: 1em;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.5);
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ff006e, #ffbe0b);
      color: #0d0221;
      border: none;
      font-size: 1.3em;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Comic Sans MS', cursive;
      box-shadow: 0 0 30px rgba(255, 0, 110, 0.7);
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 50px rgba(255, 0, 110, 1), 0 0 30px rgba(255, 190, 11, 1);
    }

    button:active {
      transform: scale(0.95);
    }

    .messages-section {
      margin-top: 40px;
    }

    .messages-title {
      color: #00f5ff;
      font-size: 2em;
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 0 20px #00f5ff;
      animation: gentle-pulse 3s ease-in-out infinite;
    }

    .message-card {
      background: linear-gradient(135deg, #ffbe0b, #ff006e);
      padding: 3px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .message-inner {
      background: #0d0221;
      padding: 20px;
      border-radius: 9px;
      border-left: 5px solid #00f5ff;
    }

    .message-author {
      color: #ffbe0b;
      font-weight: bold;
      font-size: 1.1em;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #ffbe0b;
    }

    .message-text {
      color: #00ff88;
      font-size: 1.1em;
      line-height: 1.6;
    }

    .loading {
      text-align: center;
      color: #00ff88;
      font-size: 1.2em;
      animation: gentle-pulse 2.5s ease-in-out infinite;
    }

    .success-msg {
      color: #00ff88;
      text-align: center;
      font-size: 1.2em;
      margin-top: 10px;
      animation: gentle-pulse 2.5s ease-in-out infinite;
      text-shadow: 0 0 15px #00ff88;
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  
  <div class="container">
    <div class="inner">
      <h1>🎉 RJ's BIRTHDAY BASH 🎉</h1>
      <div class="subtitle">June 14 — LEGEND STATUS UNLOCKED 🔥</div>

      <div style="margin: 30px 0; border-radius: 15px; overflow: hidden; box-shadow: 0 0 30px rgba(255, 0, 110, 0.6); border: 3px solid #ffbe0b;">
        <img src="rj-portrait.jpg" alt="RJ's Birthday Portrait" style="width: 100%; height: auto; display: block;">
      </div>

      <div class="form-section">
        <div class="form-inner">
          <h2>ADD YOUR NAME TO THE ROAST 🎤</h2>
          <form id="roastForm">
            <input 
              type="text" 
              id="name" 
              placeholder="Your Name (or alias)" 
              required
            >
            <button type="submit">LET THE ROASTING BEGIN 🚀</button>
            <div id="successMsg" class="success-msg" style="display: none;">✨ ROAST RECEIVED! ✨</div>
          </form>
        </div>
      </div>

      <div class="messages-section">
        <h2 class="messages-title">🎪 THE ROASTS ARE COMING IN 🎪</h2>
        <div id="messagesContainer" class="loading">Loading the chaos...</div>
      </div>
    </div>
  </div>

  <script>
    // Generate stars
    function createStars() {
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = (Math.random() * 3 + 1) + 'px';
        star.style.height = star.style.width;
        star.style.animationDelay = Math.random() * 2 + 's';
        starsContainer.appendChild(star);
      }
    }
    createStars();

    // RJ Roast Generator
    const rjRoasts = [
      "RJ's been fine-tuning his mixer for 41 years, but nothing can turn down the volume on getting older.",
      "The only frequency RJ can't master? The one that stops time from running out.",
      "Audio engineer by day, prostate chart enthusiast by June 14th.",
      "RJ controls every mixer setting perfectly... except the aging one.",
      "41 years of perfect sound, zero years of mastering the art of staying young.",
      "RJ: the man who can balance every audio level except his own biological clock.",
      "He can mix like a pro, but he ages like a normal human. Tale as old as time.",
      "RJ's prostate just sent him a birthday card: 'Thanks for the memories.' 💀",
      "Best audio engineer in the room... worst at preventing wrinkles.",
      "RJ spent 41 years getting his sound perfect and one day realizing his body wasn't listening.",
      "Happy Birthday to the man who can make anything sound good except his knees.",
      "41 and still got the mixer skills. The rest? ...working on it."
    ];

    function generateRoast() {
      return rjRoasts[Math.floor(Math.random() * rjRoasts.length)];
    }

    // Messages storage
    let messages = JSON.parse(localStorage.getItem('rjMessages')) || [];

    // Display messages
    function displayMessages() {
      const container = document.getElementById('messagesContainer');
      if (messages.length === 0) {
        container.innerHTML = '<div class="loading">🤔 No roasts yet... be the first! 🤔</div>';
        return;
      }
      container.innerHTML = messages.map((msg, idx) => `
        <div class="message-card" style="animation-delay: ${idx * 0.1}s;">
          <div class="message-inner">
            <div class="message-author">— ${msg.name}</div>
            <div class="message-text">${msg.message}</div>
          </div>
        </div>
      `).join('');
    }

    // Handle form submit
    document.getElementById('roastForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const message = generateRoast(); // Auto-generate roast instead of user input
      
      // Add to local storage
      messages.push({ name, message });
      localStorage.setItem('rjMessages', JSON.stringify(messages));
      
      // Reset form
      document.getElementById('roastForm').reset();
      
      // Show success
      const successMsg = document.getElementById('successMsg');
      successMsg.style.display = 'block';
      setTimeout(() => {
        successMsg.style.display = 'none';
      }, 3000);
      
      // Update display
      displayMessages();
    });

    displayMessages();
  </script>
</body>
</html>
